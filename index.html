/* ──────────────────────────────
   Calculate fluid card size from cols + screen width
   Called on build and on window resize
────────────────────────────── */
function calcCardSize(cols) {
  const gap     = Math.max(5, Math.min(10, window.innerWidth * 0.018));
  const padding = 32; // total side padding
  const maxSize = 78; // desktop cap
  const size    = Math.min(maxSize, Math.floor((window.innerWidth - padding - gap * (cols - 1)) / cols));
  // Minimum tap target: 44px (Apple HIG recommendation)
  return Math.max(44, size);
}
